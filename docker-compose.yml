# OpsMind v2 — 运维数字员工系统
#
# 必须服务：opsmind-server, opsmind-web, postgres(pgvector), minio
# 可选服务：llama-cpp + llama-cpp-emb + model-downloader（profile: ai-local）
# 8GB 内存优化：全容器 mem_limit + PostgreSQL 低内存参数
#
# 启动：
#   docker compose up -d --build                    # 4 个必须服务
#   docker compose --profile ai-local up -d --build # 含 LLM + Embedding
#   docker compose down -v                          # 停止并清除数据

services:
  # Go 后端
  opsmind-server:
    build:
      context: ./server
    container_name: opsmind-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      OPSMIND_DATABASE_HOST: postgres
      OPSMIND_MINIO_ENDPOINT: minio:9000
      OPSMIND_LOG_DIR: ./logs
      OPSMIND_RERANK_PYTHON_PATH: python3
      OPSMIND_RERANK_SCRIPT_PATH: /app/rerank_server.py
      OPSMIND_RERANK_ENABLED: "${OPSMIND_RERANK_ENABLED:-false}"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    mem_limit: 256m
    networks:
      - opsmind

  # Vue 前端
  opsmind-web:
    build:
      context: ./web
    container_name: opsmind-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - opsmind-server
    mem_limit: 128m
    networks:
      - opsmind

  # PostgreSQL + pgvector
  postgres:
    image: pgvector/pgvector:pg18
    container_name: opsmind-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opsmind}
      POSTGRES_USER: ${POSTGRES_USER:-opsmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opsmind_dev}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=10
      -c max_wal_size=512MB
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsmind"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 384m
    networks:
      - opsmind

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: opsmind-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    mem_limit: 192m
    networks:
      - opsmind

  # 模型自动下载（首次从 HuggingFace 拉取 .gguf，已有则跳过）
  model-downloader:
    image: curlimages/curl:latest
    container_name: opsmind-model-downloader
    volumes:
      - ${LLAMA_MODELS_DIR:-./models}:/models
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "=== 检查模型文件 ==="

        if [ -f /models/Qwen3-4B-Q4_K_M.gguf ]; then
          echo "[OK] Qwen3-4B-Q4_K_M.gguf 已存在，跳过"
        else
          echo "[DL] 下载 Qwen3-4B-Q4_K_M.gguf (~2.5GB)..."
          curl -fSL --retry 3 -o /models/Qwen3-4B-Q4_K_M.gguf \
            https://huggingface.co/Qwen/Qwen3-4B-GGUF/resolve/main/Qwen3-4B-Q4_K_M.gguf
          echo "[OK] Qwen3-4B-Q4_K_M.gguf 下载完成"
        fi

        if [ -f /models/Qwen3-Embedding-0.6B-Q8_0.gguf ]; then
          echo "[OK] Qwen3-Embedding-0.6B-Q8_0.gguf 已存在，跳过"
        else
          echo "[DL] 下载 Qwen3-Embedding-0.6B-Q8_0.gguf (~639MB)..."
          curl -fSL --retry 3 -o /models/Qwen3-Embedding-0.6B-Q8_0.gguf \
            https://huggingface.co/Qwen/Qwen3-Embedding-0.6B-GGUF/resolve/main/Qwen3-Embedding-0.6B-Q8_0.gguf
          echo "[OK] Qwen3-Embedding-0.6B-Q8_0.gguf 下载完成"
        fi

        echo "=== 模型检查完毕 ==="
    networks:
      - opsmind
    profiles:
      - ai-local

  # LLM 推理（Qwen3-4B Q4_K_M, ~2.5GB, CPU-only）
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: opsmind-llama-cpp
    restart: unless-stopped
    depends_on:
      model-downloader:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    volumes:
      - ${LLAMA_MODELS_DIR:-./models}:/models:ro
    command:
      - "--model"
      - "/models/${OPSMIND_LLM_MODEL:-Qwen3-4B-Q4_K_M}.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--n-gpu-layers"
      - "0"
      - "--ctx-size"
      - "4096"
      - "--flash-attn"
      - "--parallel"
      - "1"
    mem_limit: 3400m
    networks:
      - opsmind
    profiles:
      - ai-local

  # Embedding 向量化（Qwen3-Embedding-0.6B Q8_0, ~639MB, CPU-only）
  llama-cpp-emb:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: opsmind-llama-cpp-emb
    depends_on:
      model-downloader:
        condition: service_completed_successfully
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - ${LLAMA_MODELS_DIR:-./models}:/models:ro
    command:
      - "--model"
      - "/models/${OPSMIND_EMBEDDING_MODEL:-Qwen3-Embedding-0.6B-Q8_0}.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--n-gpu-layers"
      - "0"
      - "--ctx-size"
      - "2048"
      - "--embeddings"
      - "--parallel"
      - "1"
    mem_limit: 640m
    networks:
      - opsmind
    profiles:
      - ai-local

volumes:
  postgres_data:
  minio_data:

networks:
  opsmind:
    driver: bridge
