# OpsMind 默认配置 — 值与 docker-compose 本地开发环境对齐
server:
  port: 8080
  mode: debug # debug | release | test

database:
  host: localhost
  port: 5432
  user: opsmind
  password: opsmind123
  dbname: opsmind
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 10

redis:
  addr: localhost:6379
  password: ""
  db: 0

nats:
  url: nats://localhost:4222
  stream: opsmind

minio:
  endpoint: localhost:9000
  access_key: minioadmin
  secret_key: minioadmin123
  bucket: opsmind
  use_ssl: false

anythingllm:
  base_url: http://localhost:3001
  api_key: ""

vllm:
  base_url: http://localhost:8000
  api_key: ""
  model: default

jwt:
  secret: dev-secret-change-in-production
  expire_hours: 24
  refresh_expire_hours: 168

log:
  level: debug # debug | info | warn | error
  output: stdout # stdout | file
