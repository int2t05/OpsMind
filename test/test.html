<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM & Embedding Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a1c;--s:#252527;--b:#333;--t:#eee;--t2:#999;--a:#5e8af0;--r:10px}
body{font:14px/1.5 system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.tabs{display:flex;border-bottom:1px solid var(--b)}
.tab{padding:10px 24px;cursor:pointer;color:var(--t2);border:none;background:none;font:inherit;border-bottom:2px solid transparent;transition:.15s}
.tab.on{color:var(--t);border-bottom-color:var(--a)}
.panel{display:none;padding:20px;max-width:800px;margin:0 auto}
.panel.on{display:block}

.fm{display:flex;flex-direction:column;gap:12px}
.fm label{font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.fm input,.fm textarea{width:100%;padding:8px 12px;background:var(--s);border:1px solid var(--b);border-radius:6px;color:var(--t);font:inherit;outline:none}
.fm input:focus,.fm textarea:focus{border-color:var(--a)}
.fm textarea{min-height:60px;resize:vertical}
.row{display:flex;gap:8px}.row>*{flex:1}
.chk{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;user-select:none}
.chk input{width:auto;accent-color:var(--a)}
.btn{padding:8px 20px;border:none;border-radius:6px;cursor:pointer;font:inherit;font-weight:500;transition:.15s}
.btn.go{background:var(--a);color:#fff}
.btn.go:hover{filter:brightness(1.1)}
.btn.go:disabled{opacity:.4;cursor:not-allowed}
.btn.sec{background:var(--s);color:var(--t);border:1px solid var(--b)}

.out{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:14px;margin-top:12px;font:13px/1.55 monospace;white-space:pre-wrap;word-break:break-word;max-height:400px;overflow:auto;display:none}
.out.show{display:block}
.out.err{color:#f44;border-color:#f44}
.think{color:#888;border-left:3px solid #555;padding-left:10px;margin-bottom:10px;white-space:pre-wrap}
.answer{color:#eee}
.stat{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--t2);margin-top:8px}
.stat::before{content:'';width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stat.idle::before{background:#555}
.stat.ok::before{background:#4c4}
.stat.err::before{background:#f44}
.stat.wait::before{background:#fa0;animation:blink 1s infinite}
@keyframes blink{50%{opacity:.3}}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab on" onclick="switchTab('chat')">Chat</button>
  <button class="tab" onclick="switchTab('emb')">Embedding</button>
</div>

<!-- Chat Panel -->
<div class="panel on" id="panel-chat">
  <div class="fm">
    <label>Endpoint</label>
    <input id="cUrl" value="http://localhost:8081/v1/chat/completions">
    <label>Model</label>
    <input id="cModel" value="Qwen3-4B-Q4_K_M">
    <div class="row">
      <div><label>Temperature</label><input id="cTemp" value="0.7"></div>
      <div><label>Max Tokens</label><input id="cMax" value="1024"></div>
    </div>
    <label class="chk"><input type="checkbox" id="cThink" checked onchange="saveCf()"> Enable Thinking（关闭后不推理直接答，快很多）</label>
    <label>Message</label>
    <textarea id="cMsg" placeholder="输入测试消息...">什么是RAG？</textarea>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn go" id="cBtn" onclick="testChat()">Send</button>
      <button class="btn sec" id="cStop" onclick="stop()" style="display:none">Stop</button>
      <span class="stat idle" id="cStat">Idle</span>
    </div>
  </div>
  <div class="out" id="cOut"></div>
</div>

<!-- Embedding Panel -->
<div class="panel" id="panel-emb">
  <div class="fm">
    <label>Endpoint</label>
    <input id="eUrl" value="http://localhost:8082/v1/embeddings">
    <label>Model</label>
    <input id="eModel" value="Qwen3-Embedding-0.6B-Q8_0">
    <label>Input Text</label>
    <textarea id="eMsg" placeholder="输入待向量化的文本...">运维系统故障排查流程</textarea>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn go" id="eBtn" onclick="testEmb()">Send</button>
      <span class="stat idle" id="eStat">Idle</span>
    </div>
  </div>
  <div class="out" id="eOut"></div>
</div>

<script>
const $ = id => document.getElementById(id);
let abort = null;

function switchTab(name) {
  document.querySelectorAll('.tab,.panel').forEach(el => el.classList.remove('on'));
  document.querySelector(`[onclick="switchTab('${name}')"]`).classList.add('on');
  $(`panel-${name}`).classList.add('on');
}

function set(el, cls, txt) { el.className = 'stat ' + cls; el.textContent = txt; }

function saveCf() { localStorage.llmtest = JSON.stringify({ think: $('cThink').checked }); }
(function(){ try { const s = JSON.parse(localStorage.llmtest); if (s) $('cThink').checked = s.think; } catch{} })();

async function testChat() {
  const btn = $('cBtn'), stopBtn = $('cStop'), out = $('cOut'), stat = $('cStat');
  const url = $('cUrl').value.trim(), model = $('cModel').value.trim(), msg = $('cMsg').value.trim();
  if (!msg || btn.disabled) return;

  btn.disabled = true; stopBtn.style.display = ''; out.className = 'out show'; out.innerHTML = ''; set(stat, 'wait', '...');

  // 预创建 DOM 节点，流式更新只改 textContent，避免 per-chunk innerHTML 重组
  const thinkDiv = document.createElement('div'); thinkDiv.className = 'think';
  const answerDiv = document.createElement('div'); answerDiv.className = 'answer';
  const waitSpan = document.createElement('span'); waitSpan.style.color = '#888'; waitSpan.textContent = '...';
  out.appendChild(thinkDiv);
  out.appendChild(answerDiv);
  let thinking = '', answer = '', inAnswer = false, firstChunk = true;

  const body = {
    model, messages: [{ role: 'user', content: msg }],
    temperature: +$('cTemp').value || 0.7, max_tokens: +$('cMax').value || 1024,
    stream: true
  };
  // Qwen3 thinking 控制：通过 chat_template_kwargs 关闭 thinking 模式
  if (!$('cThink').checked) body.chat_template_kwargs = { enable_thinking: false };

  abort = new AbortController();

  try {
    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body), signal: abort.signal });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    const reader = res.body.getReader();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      for (const line of new TextDecoder().decode(value).split('\n').filter(l => l.startsWith('data: '))) {
        const d = line.slice(6).trim();
        if (d === '[DONE]') continue;
        try {
          const j = JSON.parse(d);
          const delta = j.choices?.[0]?.delta;
          if (delta?.content) { inAnswer = true; answer += delta.content; answerDiv.textContent = answer; }
          else if (delta?.reasoning_content) { thinking += delta.reasoning_content; thinkDiv.textContent = '💭 ' + thinking; }
          if (firstChunk) { firstChunk = false; if (!thinking) thinkDiv.remove(); if (!answer && !inAnswer) answerDiv.appendChild(waitSpan); }
          if (inAnswer && answerDiv.contains(waitSpan)) waitSpan.remove();
          out.scrollTop = out.scrollHeight;
        } catch {}
      }
    }
    set(stat, 'ok', `OK · think:${thinking.length} + answer:${answer.length} chars`);
    if (!thinking && !answer) { out.innerHTML = '<span class="err">(empty response)</span>'; return; }
  } catch (e) {
    if (e.name === 'AbortError') { set(stat, 'idle', 'Stopped'); return; }
    out.innerHTML = `<span class="err">${esc(e.message)}</span>`; set(stat, 'err', 'Error');
  }
  btn.disabled = false; stopBtn.style.display = 'none'; abort = null;
}

async function testEmb() {
  const btn = $('eBtn'), out = $('eOut'), stat = $('eStat');
  const url = $('eUrl').value.trim(), model = $('eModel').value.trim(), msg = $('eMsg').value.trim();
  if (!msg || btn.disabled) return;

  btn.disabled = true; out.className = 'out show'; out.textContent = ''; set(stat, 'wait', '...');
  const t0 = performance.now();

  try {
    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model, input: msg }) });
    const data = await res.json();
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${data.error?.message || JSON.stringify(data)}`);

    const vec = data.data?.[0]?.embedding;
    if (!vec) throw new Error('No embedding in response');
    const ms = Math.round(performance.now() - t0);
    out.textContent = JSON.stringify({ dimensions: vec.length, latency_ms: ms, sample_5: vec.slice(0, 5).map(v => +v.toFixed(4)) }, null, 2);
    set(stat, 'ok', `dim: ${vec.length} · ${ms}ms`);
  } catch (e) {
    out.innerHTML = `<span class="err">${esc(e.message)}</span>`; set(stat, 'err', 'Error');
  }
  btn.disabled = false;
}

function stop() { abort?.abort(); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

$('cMsg').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); testChat(); } });
$('eMsg').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); testEmb(); } });
</script>
</body>
</html>
