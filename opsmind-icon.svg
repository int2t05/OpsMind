<!-- OpsMind 哑光黑白极简高级图标 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="tinyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur"/>
    </filter>
  </defs>
  <!-- 双层细圆环 -->
  <circle cx="32" cy="32" r="26" stroke="#111" stroke-width="3" fill="none"/>
  <circle cx="32" cy="32" r="22" stroke="#333" stroke-width="1.5" fill="none"/>
  <!-- 极细数据流连线 -->
  <path d="M32 32 L32 6 M32 32 L58 32 M32 32 L32 58 M32 32 L6 32"
        stroke="#555" stroke-width="1"/>
  <!-- 外围弱节点 -->
  <circle cx="32" cy="6" r="3.2" fill="#333"/>
  <circle cx="58" cy="32" r="3.2" fill="#333"/>
  <circle cx="32" cy="58" r="3.2" fill="#333"/>
  <circle cx="6" cy="32" r="3.2" fill="#333"/>
  <!-- 中心主节点 -->
  <circle cx="32" cy="32" r="6" fill="#000" filter="url(#tinyGlow)"/>
</svg>
