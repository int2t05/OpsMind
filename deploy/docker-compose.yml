# OpsMind Docker Compose — 本地开发和演示环境
# 最小启动: docker compose up -d postgres redis nats minio
# 完整启动: docker compose up -d

services:
  # PostgreSQL 18 + pgvector
  postgres:
    image: pgvector/pgvector:pg18
    container_name: opsmind-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-opsmind}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-opsmind123}
      POSTGRES_DB: ${DB_NAME:-opsmind}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-opsmind} -d ${DB_NAME:-opsmind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存与会话
  redis:
    image: redis:7-alpine
    container_name: opsmind-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NATS JetStream 消息队列
  nats:
    image: nats:2.10-alpine
    container_name: opsmind-nats
    command: -js -m 8222
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "nats", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: opsmind-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go 后端 API 服务
  server:
    build:
      context: ../server
      dockerfile: ../deploy/Dockerfile.server
    container_name: opsmind-server
    env_file:
      - ../.env
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # 前端 Nginx
  nginx:
    image: nginx:1.27-alpine
    container_name: opsmind-nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../web/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
